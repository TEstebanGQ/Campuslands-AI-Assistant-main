<!DOCTYPE html>
<html class="h-full bg-slate-50" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Campuslands - Asistente Virtual</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chat-scrollbar::-webkit-scrollbar { width: 6px; }
        .chat-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .chat-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .chat-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .typing-dots span {
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background-color: #64748b;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite both;
            }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
            }
    </style>
</head>
<body class="h-full flex overflow-hidden">
    <aside class="hidden md:flex md:flex-shrink-0 bg-slate-900 w-64 flex-col transition-all duration-300">
        <div class="flex flex-col h-0 flex-1">
            <div class="flex items-center h-20 flex-shrink-0 px-6 bg-slate-950/50">
                <img alt="Logo" class="h-12 w-auto brightness-0 invert" src="./assets/logo.png"/>
            </div>
            <nav class="mt-5 flex-1 px-4 space-y-1 overflow-y-auto chat-scrollbar">
                <a id="new-chat-btn" class="bg-slate-800 text-white group flex items-center px-3 py-2 text-sm font-medium rounded-lg" href="#">
                    <svg class="mr-3 h-5 w-5 text-indigo-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
                    Nueva Conversación
                </a>
                <div id="chat-history-list" class="mt-5 flex-1 px-4 space-y-1 overflow-y-auto chat-scrollbar">
    </div>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white relative">
        <header class="flex-shrink-0 bg-white border-b border-slate-200 z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <h1 class="text-lg font-semibold text-slate-900 flex items-center gap-2">
                        <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                        Campuslands Bot
                    </h1>
                </div>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto chat-scrollbar flex flex-col">
            <div id="messages-wrapper" class="max-w-3xl mx-auto w-full px-4 py-10 space-y-8">
                <div class="flex items-start space-x-4">
                    <div class="flex-shrink-0">
                        <div class="h-10 w-10 rounded-full bg-slate-900 flex items-center justify-center overflow-hidden border-2 border-slate-200">
                            <img alt="Bot" class="h-7 w-7 brightness-0 invert" src="./assets/logo.png"/>
                        </div>
                    </div>
                    <div class="flex-1 space-y-4">
                        <div class="bg-slate-100 rounded-2xl rounded-tl-none p-5 text-slate-800 shadow-sm border border-slate-200/50">
                            <p class="leading-relaxed">¡Hola! Soy el asistente virtual de <strong>Campuslands</strong>. ¿En qué puedo ayudarte hoy?</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-shrink-0 bg-white border-t border-slate-200 p-4 md:p-6">
            <div class="max-w-3xl mx-auto relative">
                <form id="chat-form" class="relative">
                    <textarea id="user-input" class="block w-full rounded-2xl border-0 py-4 pl-4 pr-14 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 resize-none" placeholder="Escribe tu mensaje aquí..." rows="1"></textarea>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                        <button class="inline-flex items-center justify-center rounded-xl bg-indigo-600 p-2 text-white shadow-sm hover:bg-indigo-500 transition-colors" type="submit">
                            <svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20"><path d="M3.105 2.289a.75.75 0 00-.826.95l1.414 4.925A1.5 1.5 0 005.135 9.25h6.115a.75.75 0 010 1.5H5.135a1.5 1.5 0 00-1.442 1.086l-1.414 4.926a.75.75 0 00.826.95 28.896 28.896 0 0015.293-7.154.75.75 0 000-1.115A28.897 28.897 0 003.105 2.289z"></path></svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
